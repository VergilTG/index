<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bangla Header with Number List</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #f4f6f9;
            --card-bg: #ffffff;
            --text-color: #2d3748;
            --border-color: #e2e8f0;
            --accent-color: #1e3a8a;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .main-card {
            background-color: var(--card-bg);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            max-width: 520px;
            width: 100%;
        }

        /* Bangla Header Styling */
        .bangla-header {
            font-family: 'Hind Siliguri', sans-serif;
            font-weight: 700;
            color: var(--accent-color);
            font-size: 1.8rem;
            margin-top: 0;
            margin-bottom: 24px;
            text-align: center;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 12px;
        }

        /* List Container */
        .list-container {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* Single Row: Logos Group + Number */
        .list-row {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 8px;
            border-radius: 8px;
            transition: background-color 0.2s ease;
        }

        .list-row:hover {
            background-color: #f8fafc;
        }

        /* Group wrapper for rows that have multiple logos */
        .logo-group {
            display: flex;
            gap: 8px;
            flex-shrink: 0;
        }

        /* Logo Container Styling */
        .logo-box {
            width: 44px;
            height: 44px;
            background-color: #e2e8f0;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden; /* Keeps the image inside the circular border */
            flex-shrink: 0;
            border: 1px solid var(--border-color);
        }

        /* Auto-resizing Image Rules */
        .logo-box img {
            width: 100%;
            height: 100%;
            object-fit: contain; /* Scales the logo down automatically without cropping or stretching */
            padding: 4px; /* Optional: gives the logo a little breathing room inside the circle */
            box-sizing: border-box;
        }

        /* Number Styling */
        .number-text {
            font-family: "Courier New", Courier, monospace;
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--text-color);
            margin: 0;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>
